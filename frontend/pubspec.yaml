name: placement_assistant
description: AI Placement App with Weekly Reports and Graphs
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  flutter_tts: ^3.8.3
  shared_preferences: ^2.2.0
  fl_chart: ^1.1.1
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.2
  record: 5.1.0
  url_launcher: ^6.2.1
  camera: any
  camera_windows: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
dependency_overrides:
  record_linux: 1.3.0